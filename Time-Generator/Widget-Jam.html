<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Time Engine Pro - Fixed</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
    body { background-color: #000; color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; }
    .glass-panel { background: rgba(255,255,255,0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.08); border-radius: 1.5rem; }
    .gradient-text { background: linear-gradient(135deg, #818CF8 0%, #A855F7 100%); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
    .gradient-btn { background: linear-gradient(135deg, #6366F1 0%, #A855F7 100%); transition: all 0.3s; }
    .gradient-btn:hover { transform: translateY(-2px); box-shadow: 0 0 20px rgba(99, 102, 241, 0.4); }
    .input-field { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; transition: all 0.3s; }
    .preview-container { background: #0A0A0A; background-image: radial-gradient(circle at 2px 2px, rgba(255,255,255,0.05) 1px, transparent 0); background-size: 24px 24px; border-radius: 1.5rem; }
  </style>
</head>
<body class="min-h-screen">
  <nav class="border-b border-white/10 py-4 bg-black/80 backdrop-blur-xl sticky top-0 z-50">
    <div class="container mx-auto px-6 flex justify-between items-center">
      <div class="flex items-center space-x-3 text-2xl font-bold">
        <i class="fas fa-clock text-indigo-500"></i>
        <span class="gradient-text">Time Engine</span>
      </div>
      <div class="flex items-center space-x-6 text-sm font-bold">
        <a href="#" class="text-white">Clock</a>
        <a href="Widget-tanggal.html" class="text-white/60">Date</a>
        <button id="help-btn" class="text-white/60 bg-transparent border-0 cursor-pointer">Help</button>
      </div>
    </div>
  </nav>

  <div class="container mx-auto px-6 py-12 max-w-6xl">
    <div class="flex flex-col lg:flex-row gap-8">
      <!-- Controls -->
      <div class="w-full lg:w-1/3 glass-panel p-6">
        <h2 class="text-xl font-bold mb-8">Settings</h2>
        <div class="space-y-6">
          <div class="p-4 bg-indigo-500/10 border border-indigo-500/20 rounded-xl">
            <label class="block mb-2 text-[10px] font-bold text-indigo-400 uppercase">Layout</label>
            <select id="layout-style" class="input-field w-full p-3 rounded-lg bg-black text-sm outline-none">
              <option value="standard">Standard Minimal</option>
              <option value="podcaster" selected>Premium Podcaster</option>
            </select>
          </div>

          <div>
            <label class="block mb-2 text-[10px] font-bold text-gray-500 uppercase">Colors</label>
            <div class="space-y-3">
              <div class="flex gap-3">
                <input type="color" id="bg-color" value="#0a0a1a" class="w-10 h-10 bg-transparent border-0 cursor-pointer">
                <input type="text" id="bg-color-text" value="#0a0a1a" class="input-field flex-1 px-4 rounded-lg font-mono text-xs uppercase">
              </div>
              <div class="flex gap-3">
                <input type="color" id="text-color" value="#ffffff" class="w-10 h-10 bg-transparent border-0 cursor-pointer">
                <input type="text" id="text-color-text" value="#ffffff" class="input-field flex-1 px-4 rounded-lg font-mono text-xs uppercase">
              </div>
            </div>
          </div>

          <div>
            <label class="block mb-2 text-[10px] font-bold text-gray-500 uppercase">Typography</label>
            <div class="space-y-3">
              <select id="font-family" class="input-field w-full p-3 rounded-lg bg-black text-sm outline-none">
                <option value="font-sans">Plus Jakarta Sans</option>
                <option value="font-serif">Serif Elegant</option>
                <option value="font-mono">Monospace Modern</option>
              </select>
              <select id="font-size" class="input-field w-full p-3 rounded-lg bg-black text-sm outline-none">
                <option value="text-5xl">Small</option>
                <option value="text-7xl" selected>Normal</option>
                <option value="text-9xl">Extra Large</option>
              </select>
            </div>
          </div>

          <div id="radius-container">
            <label class="block mb-2 text-[10px] font-bold text-gray-500 uppercase">Radius</label>
            <input type="range" id="radius-global" min="0" max="100" value="40" class="w-full accent-indigo-500">
          </div>

          <button id="generate-btn" class="gradient-btn w-full py-4 rounded-xl font-bold uppercase tracking-widest text-xs shadow-lg">
            Generate Code
          </button>
        </div>
      </div>

      <!-- Preview -->
      <div class="w-full lg:w-2/3">
        <h2 class="text-xl font-bold mb-4 text-indigo-400">Live Preview</h2>
        <div class="preview-container p-8 min-h-[450px] flex items-center justify-center border border-white/5">
          <div id="preview-wrapper" class="relative">
            <!-- Glow for Podcaster -->
            <div id="glow-effect" class="absolute -inset-2 rounded-[40px] opacity-60 blur-md" style="background: linear-gradient(135deg, #6366F1, #A855F7);"></div>
            
            <div id="widget-box" class="relative z-10 transition-all duration-300" style="background: #0a0a1a; color: #fff; border-radius: 40px; border: 2px solid rgba(255,255,255,0.1);">
              <!-- Layout: Podcaster -->
              <div id="view-podcaster" class="flex items-center gap-8 p-8 min-w-[500px]">
                <div id="icon-box" class="bg-white/10 p-6 rounded-2xl w-28 h-28 flex items-center justify-center border border-white/5">
                  <i class="fas fa-moon text-5xl" id="time-icon"></i>
                </div>
                <div class="flex flex-col">
                  <div class="flex items-baseline gap-3">
                    <span id="time-val" class="text-8xl font-extrabold leading-none tracking-tighter">12:34</span>
                    <span id="ampm-val" class="text-4xl font-black text-pink-500">PM</span>
                  </div>
                  <div id="date-val" class="text-xl font-bold tracking-[0.2em] mt-3 uppercase opacity-60">SUN, 10 MAY 2026</div>
                </div>
              </div>

              <!-- Layout: Standard -->
              <div id="view-standard" class="hidden p-12 text-center min-w-[350px]">
                <div id="time-std" class="text-7xl font-bold">12:34</div>
              </div>
            </div>
          </div>
        </div>

        <!-- Code Area -->
        <div id="code-panel" class="hidden mt-8 glass-panel p-6 border border-indigo-500/20">
          <div class="flex justify-between items-center mb-4">
            <h3 class="font-bold text-indigo-400">Widget Code</h3>
            <button id="copy-btn" class="gradient-btn px-4 py-2 rounded-lg text-xs font-bold">Copy to Clipboard</button>
          </div>
          <pre class="bg-black/50 p-4 rounded-xl overflow-x-auto text-[10px] text-gray-400 max-h-64 border border-white/5"><code id="code-text"></code></pre>
        </div>
      </div>
    </div>
  </div>

  <script>
    const UI = {
      get: (id) => document.getElementById(id),
      update() {
        const bg = this.get('bg-color').value;
        const txt = this.get('text-color').value;
        const layout = this.get('layout-style').value;
        const font = this.get('font-family').value;
        const size = this.get('font-size').value;
        const rad = this.get('radius-global').value;

        // Sync inputs
        this.get('bg-color-text').value = bg.toUpperCase();
        this.get('text-color-text').value = txt.toUpperCase();

        const box = this.get('widget-box');
        const glow = this.get('glow-effect');
        const radContainer = this.get('radius-container');

        box.style.backgroundColor = bg;
        box.style.color = txt;

        if (layout === 'podcaster') {
          this.get('view-podcaster').classList.remove('hidden');
          this.get('view-podcaster').classList.add('flex');
          this.get('view-standard').classList.add('hidden');
          glow.classList.remove('hidden');
          radContainer.classList.add('opacity-30', 'pointer-events-none');
          box.style.borderRadius = '40px';
          
          this.get('time-val').className = `${size} ${font} font-extrabold leading-none tracking-tighter`;
          this.get('date-val').className = `text-xl ${font} font-bold tracking-[0.2em] mt-3 uppercase opacity-60`;
          this.get('time-icon').style.color = txt;
        } else {
          this.get('view-podcaster').classList.add('hidden');
          this.get('view-podcaster').classList.remove('flex');
          this.get('view-standard').classList.remove('hidden');
          glow.classList.add('hidden');
          radContainer.classList.remove('opacity-30', 'pointer-events-none');
          box.style.borderRadius = rad + 'px';
          
          this.get('time-std').className = `${size} ${font} font-bold`;
        }
        this.tick();
      },

      tick() {
        const now = new Date();
        const layout = this.get('layout-style').value;
        let h = now.getHours();
        const m = now.getMinutes().toString().padStart(2, '0');
        const ampm = h >= 12 ? 'PM' : 'AM';

        if (layout === 'podcaster') {
          const h12 = h % 12 || 12;
          this.get('time-val').textContent = `${h12}:${m}`;
          this.get('ampm-val').textContent = ampm;
          const opt = { weekday: 'short', day: '2-digit', month: 'short', year: 'numeric' };
          this.get('date-val').textContent = now.toLocaleDateString('en-US', opt).toUpperCase().replace(/,/g, '');
          const icon = this.get('time-icon');
          icon.className = (h >= 6 && h < 18) ? 'fas fa-sun text-yellow-400' : 'fas fa-moon text-indigo-300';
        } else {
          this.get('time-std').textContent = `${h.toString().padStart(2, '0')}:${m}`;
        }
      },

      generate() {
        const bg = this.get('bg-color').value;
        const txt = this.get('text-color').value;
        const layout = this.get('layout-style').value;
        const font = this.get('font-family').value;
        const size = this.get('font-size').value;
        const rad = this.get('radius-global').value;

        let content = '';
        if (layout === 'podcaster') {
          content = `
<div style="position:relative;display:inline-block;font-family:sans-serif;">
  <div style="position:absolute;inset:-5px;border-radius:40px;background:linear-gradient(135deg,#6366F1,#A855F7);filter:blur(10px);opacity:0.6;"></div>
  <div style="position:relative;display:flex;align-items:center;gap:30px;padding:35px;background:${bg};color:${txt};border-radius:40px;border:2px solid rgba(255,255,255,0.1);min-width:520px;box-shadow:0 25px 50px -12px rgba(0,0,0,0.5);">
    <div style="background:rgba(255,255,255,0.1);padding:25px;border-radius:20px;width:110px;height:110px;display:flex;align-items:center;justify-content:center;border:1px solid rgba(255,255,255,0.05);">
      <i id="icon" class="fas fa-moon" style="font-size:55px;"></i>
    </div>
    <div>
      <div style="display:flex;align-items:baseline;gap:12px;">
        <span id="time" style="font-size:90px;font-weight:900;line-height:1;letter-spacing:-0.05em;">11:18</span>
        <span id="ampm" style="font-size:35px;font-weight:900;color:#EC4899;">PM</span>
      </div>
      <div id="date" style="font-size:18px;font-weight:800;letter-spacing:0.25em;opacity:0.6;margin-top:12px;text-transform:uppercase;">SUN, 10 MAY 2026</div>
    </div>
  </div>
</div>`;
        } else {
          content = `
<div style="display:inline-block;padding:50px;background:${bg};color:${txt};border-radius:${rad}px;text-align:center;min-width:350px;box-shadow:0 30px 60px rgba(0,0,0,0.6);border:1px solid rgba(255,255,255,0.05);">
  <div id="time" style="font-size:90px;font-weight:900;letter-spacing:-0.02em;">12:34</div>
</div>`;
        }

        return `<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body { margin:0; padding:50px; display:flex; justify-content:center; align-items:center; min-height:100vh; background:transparent; overflow:hidden; }
    #time { font-variant-numeric: tabular-nums; }
  </style>
</head>
<body>
  ${content}
  <script>
    function u(){
      const n=new Date(); let h=n.getHours(); const m=n.getMinutes().toString().padStart(2,'0');
      const t=document.getElementById('time');
      const am=document.getElementById('ampm');
      if(am){
        const p=h>=12?'PM':'AM'; h=h%12||12;
        t.textContent=h+":"+m; am.textContent=p;
        const opt={weekday:'short',day:'2-digit',month:'short',year:'numeric'};
        document.getElementById('date').textContent=n.toLocaleDateString('en-US',opt).toUpperCase().replace(/,/g,'');
        const i=document.getElementById('icon');
        const isDay = n.getHours()>=6 && n.getHours()<18;
        i.className = isDay ? 'fas fa-sun' : 'fas fa-moon';
        i.style.color = isDay ? '#FBBF24' : '#818CF8';
      } else {
        t.textContent=h.toString().padStart(2,'0')+":"+m;
      }
    }
    setInterval(u,1000); u();
  <\/script>
</body>
</html>`;
      }
    };

    // Listeners
    const inputs = ['bg-color', 'text-color', 'layout-style', 'font-family', 'font-size', 'radius-global'];
    inputs.forEach(id => {
      const el = UI.get(id);
      el.addEventListener('input', () => UI.update());
      el.addEventListener('change', () => UI.update());
    });

    UI.get('generate-btn').onclick = () => {
      UI.get('code-text').textContent = UI.generate();
      UI.get('code-panel').classList.remove('hidden');
    };

    UI.get('copy-btn').onclick = () => {
      navigator.clipboard.writeText(UI.get('code-text').textContent);
      const btn = UI.get('copy-btn');
      btn.textContent = 'Copied!';
      setTimeout(() => btn.textContent = 'Copy to Clipboard', 2000);
    };

    UI.get('bg-color-text').oninput = (e) => { UI.get('bg-color').value = e.target.value; UI.update(); };
    UI.get('text-color-text').oninput = (e) => { UI.get('text-color').value = e.target.value; UI.update(); };
    UI.get('help-btn').onclick = () => UI.get('help-modal').classList.remove('hidden');
    UI.get('close-help').onclick = () => UI.get('help-modal').classList.add('hidden');

    setInterval(() => UI.tick(), 1000);
    window.onload = () => UI.update();
  </script>
</body>
</html>
