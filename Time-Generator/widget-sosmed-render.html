<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Widget Sosmed – OBS</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      background: transparent;
      overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      font-family: ui-sans-serif, system-ui, sans-serif;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    .fade-in { animation: fadeIn 0.8s cubic-bezier(0.4,0,0.2,1); }

    .widget-box {
      padding: 32px; text-align: center;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }
    #w-time {
      font-weight: 900; line-height: 1; font-variant-numeric: tabular-nums;
      font-size: clamp(3rem, 10vw, 7rem);
    }
    #w-info { margin-top: 16px; font-size: clamp(1rem, 3vw, 1.75rem); }

    .twitter-color   { color: #1DA1F2; }
    .instagram-color { color: #E1306C; }
    .youtube-color   { color: #FF0000; }

    .ff-sans  { font-family: ui-sans-serif, system-ui, sans-serif; }
    .ff-serif { font-family: ui-serif, Georgia, serif; }
    .ff-mono  { font-family: ui-monospace, 'Courier New', monospace; }
    .ff-slab  { font-family: 'Roboto Slab', serif; }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="widget-box" id="widget"></div>

<script>
  const p = new URLSearchParams(window.location.search);

  const bg        = p.get('bg')        || '#003152';
  const timetext  = p.get('timetext')  || '#ffffff';
  const infotext  = p.get('infotext')  || '#fef08a';
  const radius    = p.get('radius')    || '24';
  const interval  = parseInt(p.get('interval') || '30');
  const timefont  = p.get('timefont')  || 'ff-sans';
  const infofont  = p.get('infofont')  || 'ff-sans';

  const showtwitter    = p.get('showtwitter')    !== '0';
  const twitter        = p.get('twitter')        || '';
  const twittericon    = p.get('twittericon')    !== '0';

  const showinstagram  = p.get('showinstagram')  !== '0';
  const instagram      = p.get('instagram')      || '';
  const instagramicon  = p.get('instagramicon')  !== '0';

  const showyoutube    = p.get('showyoutube')    !== '0';
  const youtube        = p.get('youtube')        || '';
  const youtubeicon    = p.get('youtubeicon')    !== '0';

  const showdate       = p.get('showdate')       !== '0';
  const showart        = p.get('showart')        === '1';
  const art            = p.get('art')            || '';

  /* Build info items */
  function getCurrentDate() {
    const now = new Date();
    const days = ['Min','Sen','Sel','Rab','Kam','Jum','Sab'];
    const d = String(now.getDate()).padStart(2,'0');
    const m = String(now.getMonth()+1).padStart(2,'0');
    return `${days[now.getDay()]}, ${d}/${m}/${now.getFullYear()}`;
  }

  const infoItems = [];
  if (showdate) infoItems.push(() => getCurrentDate());
  if (showtwitter && twitter)   infoItems.push(() => twittericon
    ? `<i class="fab fa-twitter twitter-color mr-2"></i>${twitter}`
    : `Twitter: ${twitter}`);
  if (showinstagram && instagram) infoItems.push(() => instagramicon
    ? `<i class="fab fa-instagram instagram-color mr-2"></i>${instagram}`
    : `Instagram: ${instagram}`);
  if (showyoutube && youtube)   infoItems.push(() => youtubeicon
    ? `<i class="fab fa-youtube youtube-color mr-2"></i>${youtube}`
    : `YouTube: ${youtube}`);
  if (showart && art) infoItems.push(() => art);

  /* Render widget */
  const widget = document.getElementById('widget');
  widget.style.backgroundColor = bg;
  widget.style.borderRadius = radius + 'px';
  widget.innerHTML = `
    <div id="w-time" class="${timefont}" style="color:${timetext};">00:00</div>
    <div id="w-info" class="${infofont} fade-in" style="color:${infotext};"></div>`;

  /* Clock */
  function updateTime() {
    const now = new Date();
    const h = String(now.getHours()).padStart(2,'0');
    const m = String(now.getMinutes()).padStart(2,'0');
    document.getElementById('w-time').textContent = `${h}:${m}`;
  }
  updateTime(); setInterval(updateTime, 1000);

  /* Rotating info */
  let idx = 0;
  function updateInfo() {
    if (infoItems.length === 0) return;
    const el = document.getElementById('w-info');
    el.innerHTML = infoItems[idx]();
    el.classList.remove('fade-in');
    void el.offsetWidth;
    el.classList.add('fade-in');
    idx = (idx + 1) % infoItems.length;
  }

  if (infoItems.length > 0) {
    updateInfo();
    setInterval(updateInfo, interval * 1000);
  }
</script>
</body>
</html>
